name: Update Release Manifest

on:
  release:
    types: [published, edited, prereleased]
  workflow_dispatch:

concurrency:
  group: update-release-manifest
  cancel-in-progress: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      packages: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch Release and Package Data
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all releases from repository..."
          curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" > releases_list.json

          echo "Fetching container package versions for niksphere-engine..."
          mkdir -p package_versions
          for comp in engine; do
            pkg_name="niksphere-${comp}"
            echo "Fetching versions for container package ${pkg_name}..."
            curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/orgs/niksphere/packages/container/${pkg_name}/versions?per_page=100" > "package_versions/${pkg_name}.json"
          done

      - name: Update releases.json
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");

            const releases = JSON.parse(fs.readFileSync("releases_list.json", "utf8"));
            
            if (!Array.isArray(releases)) {
              console.error("Error: Invalid releases list retrieved.");
              process.exit(1);
            }
            
            const manifest = {
              channels: {
                stable: {},
                insider: {}
              }
            };
            
            const componentNames = {
              "cli": "Niksphere CLI",
              "engine": "Niksphere Engine",
              "ide-vscode": "Niksphere VS Code Extension"
            };

            // 1. Process GitHub Releases
            releases.forEach(release => {
              const tag = release.tag_name;
              
              if (tag && tag.includes("/")) {
                const parts = tag.split("/");
                const component = parts[0];
                const version = parts[1];
                
                if (component === "cli" || component === "engine" || component === "ide-vscode") {
                  const channel = release.prerelease ? "insider" : "stable";
                  
                  if (!manifest.channels[channel]) {
                    manifest.channels[channel] = {};
                  }
                  const channelObj = manifest.channels[channel];
                  if (!channelObj[component]) {
                    channelObj[component] = [];
                  }
                  
                  const assets = {};
                  if (release.assets) {
                    release.assets.forEach(asset => {
                      const assetName = asset.name;
                      const expectedPrefix = `niksphere-${component}-${version}`;
                      
                      if (assetName.includes(expectedPrefix)) {
                        const remaining = assetName.substring(expectedPrefix.length);
                        const lastDotIndex = remaining.lastIndexOf(".");
                        const rawSuffix = lastDotIndex !== -1 ? remaining.substring(0, lastDotIndex) : remaining;
                        let key = rawSuffix.startsWith("-") ? rawSuffix.substring(1) : rawSuffix;
                        
                        if (!key) {
                          if (component === "ide-vscode") {
                            key = "vsix";
                          } else {
                            key = "default";
                          }
                        }
                        
                        assets[key] = {
                          url: asset.browser_download_url,
                          size: asset.size || 0
                        };
                      }
                    });
                  }

                  channelObj[component].push({
                    name: componentNames[component] || component,
                    version: version,
                    published_at: release.published_at || new Date().toISOString(),
                    assets: assets
                  });
                }
              }
            });

            // 2. Process GHCR Container Packages (only those linked to niksphere-install)
            const versionsDir = "package_versions";
            if (fs.existsSync(versionsDir)) {
              const files = fs.readdirSync(versionsDir);
              files.forEach(file => {
                if (file.endsWith(".json")) {
                  const pkgName = file.replace(".json", "");
                  const component = pkgName.replace(/^niksphere-/, "");
                  
                  try {
                    const pkgVersions = JSON.parse(fs.readFileSync(path.join(versionsDir, file), "utf8"));
                    if (Array.isArray(pkgVersions)) {
                      pkgVersions.forEach(v => {
                        const containerMeta = v.metadata && v.metadata.container;
                        const tags = containerMeta && Array.isArray(containerMeta.tags) ? containerMeta.tags : [];
                        
                        if (tags.length === 0) return;
                        
                        let channel = "insider";
                        if (tags.includes("latest") || tags.some(t => t.includes("-channel.stable"))) {
                          channel = "stable";
                        } else if (tags.includes("insider") || tags.some(t => t.includes("-channel.insider"))) {
                          channel = "insider";
                        }
                        
                        let specificVersionTag = tags.find(t => t.startsWith("v") && t.includes("-build."))
                                              || tags.find(t => t.startsWith("v"))
                                              || tags.find(t => t !== "latest" && t !== "insider");

                        if (!specificVersionTag) return;

                        const pullCmd = `docker pull ghcr.io/niksphere/${pkgName}:${specificVersionTag}`;
                        
                        if (!manifest.channels[channel]) {
                          manifest.channels[channel] = {};
                        }
                        const channelObj = manifest.channels[channel];
                        if (!channelObj[component]) {
                          channelObj[component] = [];
                        }
                        
                        let relEntry = channelObj[component].find(r => r.version === specificVersionTag);
                        
                        if (!relEntry) {
                          relEntry = channelObj[component].find(r => specificVersionTag.startsWith(r.version) || r.version.startsWith(specificVersionTag));
                        }
                        
                        if (relEntry) {
                          if (!relEntry.install) {
                            relEntry.install = {};
                          }
                          relEntry.install.docker = pullCmd;
                          
                          relEntry.container = {
                            image: `ghcr.io/niksphere/${pkgName}:${specificVersionTag}`,
                            registry: "ghcr.io",
                            package: pkgName,
                            tags: tags
                          };
                        } else {
                          const newEntry = {
                            name: componentNames[component] || component,
                            version: specificVersionTag,
                            published_at: v.created_at || v.updated_at || new Date().toISOString(),
                            install: {
                              docker: pullCmd
                            },
                            container: {
                              image: `ghcr.io/niksphere/${pkgName}:${specificVersionTag}`,
                              registry: "ghcr.io",
                              package: pkgName,
                              tags: tags
                            },
                            assets: {}
                          };
                          channelObj[component].push(newEntry);
                        }
                      });
                    }
                  } catch (err) {
                    console.error(`Error processing package file ${file}:`, err);
                  }
                }
              });
            }

            // 3. Sort releases chronologically descending
            for (const ch in manifest.channels) {
              const channelObj = manifest.channels[ch];
              for (const comp in channelObj) {
                channelObj[comp].sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
              }
            }

            // 4. Generate CLI install commands
            for (const ch in manifest.channels) {
              const channelObj = manifest.channels[ch];
              if (channelObj["cli"]) {
                channelObj["cli"].forEach((rel, index) => {
                  const isLatestStable = (index === 0 && ch === "stable");
                  
                  const bashCmd = isLatestStable
                    ? "curl -fsSL https://install.niksphere.de/install.sh | bash"
                    : `curl -fsSL https://install.niksphere.de/install.sh | bash -s -- -c "${ch}" -v "${rel.version}"`;
                    
                  const psCmd = isLatestStable
                    ? "irm https://install.niksphere.de/install.ps1 | iex"
                    : `irm https://install.niksphere.de/install.ps1 -OutFile install.ps1; .\\install.ps1 -Channel "${ch}" -Version "${rel.version}"`;
                    
                  if (!rel.install) {
                    rel.install = {};
                  }
                  rel.install.bash = bashCmd;
                  rel.install.powershell = psCmd;

                  rel.uninstall = {
                    "bash": "curl -fsSL https://install.niksphere.de/uninstall.sh | bash",
                    "powershell": "irm https://install.niksphere.de/uninstall.ps1 | iex"
                  };
                });
              }
            }

            fs.writeFileSync("releases.json", JSON.stringify(manifest, null, 2));
            console.log("releases.json successfully rebuilt from GitHub Releases and GHCR Packages.");
          '

      - name: Commit and Push changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add releases.json
          
          if git diff --cached --quiet; then
            echo "No changes made to releases.json."
          else
            git commit -m "chore: update releases.json for release"
            git push origin main
            
            echo "Triggering GitHub Pages deployment workflow..."
            gh workflow run pages.yml --repo "${{ github.repository }}" --ref main
          fi
