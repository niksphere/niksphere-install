name: Update Release Manifest

on:
  release:
    types: [published, edited, prereleased]
  workflow_dispatch:

concurrency:
  group: update-release-manifest
  cancel-in-progress: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch Release Data
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all releases from repository..."
          curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" > releases_list.json

      - name: Update releases.json
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const releases = JSON.parse(fs.readFileSync("releases_list.json", "utf8"));
            
            if (!Array.isArray(releases)) {
              console.error("Error: Invalid releases list retrieved.");
              process.exit(1);
            }
            
            const manifest = {
              channels: {
                stable: {},
                insider: {}
              }
            };
            
            releases.forEach(release => {
              const tag = release.tag_name;
              
              // Only process decoupled releases containing a slash "/"
              if (tag && tag.includes("/")) {
                const parts = tag.split("/");
                const component = parts[0]; // "cli", "engine", "ide-vscode"
                const version = parts[1];   // e.g. "v1.0.0-build.1"
                
                if (component === "cli" || component === "engine" || component === "ide-vscode") {
                  const channel = release.prerelease ? "insider" : "stable";
                  
                  if (!manifest.channels[channel]) {
                    manifest.channels[channel] = {};
                  }
                  const channelObj = manifest.channels[channel];
                  if (!channelObj[component]) {
                    channelObj[component] = [];
                  }
                  
                  const assets = {};
                  if (release.assets) {
                    release.assets.forEach(asset => {
                      const assetName = asset.name;
                      const expectedPrefix = `niksphere-${component}-${version}`;
                      
                      if (assetName.includes(expectedPrefix)) {
                        const remaining = assetName.substring(expectedPrefix.length);
                        const lastDotIndex = remaining.lastIndexOf(".");
                        const rawSuffix = lastDotIndex !== -1 ? remaining.substring(0, lastDotIndex) : remaining;
                        let key = rawSuffix.startsWith("-") ? rawSuffix.substring(1) : rawSuffix;
                        
                        if (!key) {
                          if (component === "ide-vscode") {
                            key = "vsix";
                          } else {
                            key = "default";
                          }
                        }
                        
                        assets[key] = asset.browser_download_url;
                      }
                    });
                  }

                  channelObj[component].push({
                    version: version,
                    published_at: release.published_at || new Date().toISOString(),
                    assets: assets
                  });
                }
              }
            });

            // Sort releases in each component array chronologically descending (newest first)
            for (const ch in manifest.channels) {
              const channelObj = manifest.channels[ch];
              for (const comp in channelObj) {
                channelObj[comp].sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
              }
            }

            // Generate installation commands for CLI releases
            for (const ch in manifest.channels) {
              const channelObj = manifest.channels[ch];
              if (channelObj["cli"]) {
                channelObj["cli"].forEach((rel, index) => {
                  const isLatestStable = (index === 0 && ch === "stable");
                  
                  const bashCmd = isLatestStable
                    ? "curl -fsSL https://install.niksphere.de/install.sh | bash"
                    : `curl -fsSL https://install.niksphere.de/install.sh | bash -s -- -c "${ch}" -v "${rel.version}"`;
                    
                  const psCmd = isLatestStable
                    ? "irm https://install.niksphere.de/install.ps1 | iex"
                    : `irm https://install.niksphere.de/install.ps1 -OutFile install.ps1; .\\install.ps1 -Channel "${ch}" -Version "${rel.version}"`;
                    
                  rel.install = {
                    "bash": bashCmd,
                    "powershell": psCmd
                  };

                  rel.uninstall = {
                    "bash": "curl -fsSL https://install.niksphere.de/uninstall.sh | bash",
                    "powershell": "irm https://install.niksphere.de/uninstall.ps1 | iex"
                  };
                });
              }
            }
            
            fs.writeFileSync("releases.json", JSON.stringify(manifest, null, 2));
            console.log("releases.json successfully rebuilt from GitHub Releases.");
            
            // Generate README markdown
            let readmeMarkdown = "\n";
            const channelsList = ["stable", "insider"];
            channelsList.forEach(ch => {
              const capitalizedChannel = ch.charAt(0).toUpperCase() + ch.slice(1);
              readmeMarkdown += `### 🚀 ${capitalizedChannel} Channel\n\n`;
              
              const channelData = manifest.channels[ch] || {};
              const components = Object.keys(channelData);
              
              if (components.length === 0) {
                readmeMarkdown += "_No releases published in this channel yet._\n\n";
              } else {
                readmeMarkdown += "| Component | Version | Published At | Download Links |\n";
                readmeMarkdown += "| --- | --- | --- | --- |\n";
                
                components.forEach(comp => {
                  const compList = channelData[comp] || [];
                  const compData = compList[0] || {};
                  const version = compData.version || "N/A";
                  const date = compData.published_at ? new Date(compData.published_at).toISOString().replace("T", " ").substring(0, 16) + " UTC" : "N/A";
                  
                  // Build download links
                  let links = [];
                  if (compData.assets) {
                    for (const plat in compData.assets) {
                      const url = compData.assets[plat];
                      links.push(`[${plat}](${url})`);
                    }
                  }
                  const linksStr = links.length > 0 ? links.join(" \\| ") : "No assets available";
                  
                  readmeMarkdown += `| \`${comp}\` | \`${version}\` | ${date} | ${linksStr} |\n`;
                });
                readmeMarkdown += "\n";
              }
            });
            
            // Update README.md file
            if (fs.existsSync("README.md")) {
              let readmeContent = fs.readFileSync("README.md", "utf8");
              const startMarker = "<!-- RELEASES_START -->";
              const endMarker = "<!-- RELEASES_END -->";
              
              if (readmeContent.includes(startMarker) && readmeContent.includes(endMarker)) {
                const startIndex = readmeContent.indexOf(startMarker) + startMarker.length;
                const endIndex = readmeContent.indexOf(endMarker);
                
                const newReadmeContent = readmeContent.substring(0, startIndex) + readmeMarkdown + readmeContent.substring(endIndex);
                fs.writeFileSync("README.md", newReadmeContent, "utf8");
                console.log("README.md successfully updated with latest release tables.");
              } else {
                console.log("Warning: Markers <!-- RELEASES_START --> and <!-- RELEASES_END --> not found in README.md.");
              }
            }
          '

      - name: Commit and Push changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add releases.json README.md
          
          if git diff --cached --quiet; then
            echo "No changes made to releases.json and README.md."
          else
            git commit -m "chore: update releases.json and README.md for release"
            git push origin main
            
            echo "Triggering GitHub Pages deployment workflow..."
            gh workflow run pages.yml --repo "${{ github.repository }}" --ref main
          fi
