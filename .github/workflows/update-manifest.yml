name: Update Release Manifest

on:
  release:
    types: [published, edited, prereleased]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (leave empty for latest release)'
        required: false
        default: ''

concurrency:
  group: update-release-manifest
  cancel-in-progress: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch Release Data
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
            if [ -z "$TAG_NAME" ]; then
              echo "Fetching latest release details (including prereleases)..."
              curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases" | node -e '
                  const fs = require("fs");
                  const data = JSON.parse(fs.readFileSync(0, "utf-8"));
                  if (Array.isArray(data) && data.length > 0) {
                    fs.writeFileSync("release_data.json", JSON.stringify(data[0]));
                  } else {
                    console.error("No releases found in repository.");
                    process.exit(1);
                  }
                '
            else
              echo "Fetching release details for tag $TAG_NAME..."
              curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME" > release_data.json
            fi
          else
            cp "$GITHUB_EVENT_PATH" release_data.json
          fi

      - name: Update releases.json
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("release_data.json", "utf8"));
            const release = data.release || data;
            
            if (!release || !release.tag_name) {
              console.error("Error: No valid release data found.");
              process.exit(1);
            }
            
            let manifest = { channels: {} };
            if (fs.existsSync("releases.json")) {
              try {
                manifest = JSON.parse(fs.readFileSync("releases.json", "utf8"));
              } catch (e) {
                console.log("Creating new releases.json because the old file was invalid.");
              }
            }
            if (!manifest.channels) {
              manifest.channels = {};
            }
            
            const tag = release.tag_name;
            let component = "";
            let version = tag;
            if (tag.includes("/")) {
              const parts = tag.split("/");
              component = parts[0]; // "cli", "engine", "ide-vscode"
              version = parts[1];   // "v1.0.0-build.1"
            }
            
            // Channels: "stable" or "insider"
            const channel = release.prerelease ? "insider" : "stable";
            
            if (!manifest.channels[channel]) {
              manifest.channels[channel] = {};
            }
            const channelObj = manifest.channels[channel];
            
            // Clean up legacy global properties if present
            delete channelObj.version;
            delete channelObj.published_at;
            delete channelObj.notes;
            delete channelObj.versions;
            
            // Initialize component structure
            if (component) {
              channelObj[component] = {
                versions: version,
                published_at: release.published_at || new Date().toISOString(),
                assets: {}
              };
            }
            
            const escapedVersion = version.replace(/[-\/\\^$*+?.()|[\]{}]/g, "\\$&");
            
            // Regex matches standard platforms (OS-Arch) OR "docker"
            const regex = new RegExp("niksphere-([a-zA-Z0-9-]+)-" + escapedVersion + "(?:-((?:win|linux|mac)-(?:x64|arm64)|docker))?\\.(.+)$");
            
            if (release.assets) {
              release.assets.forEach(asset => {
                const match = asset.name.match(regex);
                if (match) {
                  const matchedComponent = match[1];
                  const platform = match[2];
                  
                  if (matchedComponent === component) {
                    if (!channelObj[matchedComponent].assets) {
                      channelObj[matchedComponent].assets = {};
                    }
                    
                    if (platform) {
                      channelObj[matchedComponent].assets[platform] = asset.browser_download_url;
                    } else {
                      if (matchedComponent === "ide-vscode") {
                        channelObj[matchedComponent].assets["vsix"] = asset.browser_download_url;
                      } else {
                        channelObj[matchedComponent].assets["default"] = asset.browser_download_url;
                      }
                    }
                  }
                }
              });
            }
            
            fs.writeFileSync("releases.json", JSON.stringify(manifest, null, 2));
            console.log(`Channel "${channel}" component "${component}" successfully updated.`);
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add releases.json
          
          if git diff --cached --quiet; then
            echo "No changes made to releases.json."
          else
            git commit -m "chore: update releases.json for release"
            git push origin main
          fi
