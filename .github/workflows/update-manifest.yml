name: Update Release Manifest

on:
  release:
    types: [published, edited, prereleased]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (leave empty for latest release)'
        required: false
        default: ''

concurrency:
  group: update-release-manifest
  cancel-in-progress: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Release Data
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
            if [ -z "$TAG_NAME" ]; then
              echo "Fetching latest release details..."
              curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/latest" > release_data.json
            else
              echo "Fetching release details for tag $TAG_NAME..."
              curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME" > release_data.json
            fi
          else
            cp "$GITHUB_EVENT_PATH" release_data.json
          fi

      - name: Update releases.json
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("release_data.json", "utf8"));
            const release = data.release || data;
            
            if (!release || !release.tag_name) {
              console.error("Error: No valid release data found.");
              process.exit(1);
            }
            
            let manifest = { channels: {} };
            if (fs.existsSync("releases.json")) {
              try {
                manifest = JSON.parse(fs.readFileSync("releases.json", "utf8"));
              } catch (e) {
                console.log("Creating new releases.json because the old file was invalid.");
              }
            }
            
            const isDev = release.prerelease || release.tag_name.includes("dev");
            const channel = isDev ? "dev" : "stable";
            
            manifest.channels[channel] = {
              version: release.tag_name,
              published_at: release.published_at || new Date().toISOString(),
              notes: release.body || ""
            };
            
            const channelObj = manifest.channels[channel];
            
            // Escape tag name to avoid regex issues
            const escapedTagName = release.tag_name.replace(/[-\/\\^$*+?.()|[\]{}]/g, "\\$&");
            
            // Regex matches standard platforms (OS-Arch) OR "docker"
            const regex = new RegExp("niksphere-([a-zA-Z0-9-]+)-" + escapedTagName + "(?:-((?:win|linux|mac)-(?:x64|arm64)|docker))?\\.(.+)$");
            
            if (release.assets) {
              release.assets.forEach(asset => {
                const match = asset.name.match(regex);
                if (match) {
                  const component = match[1];
                  const platform = match[2];
                  
                  if (platform) {
                    if (!channelObj[component] || typeof channelObj[component] !== "object") {
                      channelObj[component] = {};
                    }
                    channelObj[component][platform] = asset.browser_download_url;
                  } else {
                    channelObj[component] = asset.browser_download_url;
                  }
                }
              });
            }
            
            fs.writeFileSync("releases.json", JSON.stringify(manifest, null, 2));
            console.log(`Channel "${channel}" successfully updated.`);
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add releases.json
          
          if git diff --cached --quiet; then
            echo "No changes made to releases.json."
          else
            git commit -m "chore: update releases.json for release"
            git push origin main
          fi
