name: Update Release Manifest

on:
  release:
    types: [published, edited, prereleased]
  workflow_dispatch:

concurrency:
  group: update-release-manifest
  cancel-in-progress: false

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch Release Data
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all releases from repository..."
          curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" > releases_list.json

      - name: Update releases.json
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const releases = JSON.parse(fs.readFileSync("releases_list.json", "utf8"));
            
            if (!Array.isArray(releases)) {
              console.error("Error: Invalid releases list retrieved.");
              process.exit(1);
            }
            
            const manifest = {
              channels: {
                stable: {},
                insider: {}
              }
            };
            
            // Sort releases chronologically ascending (oldest first) so newer ones overwrite older ones
            releases.sort((a, b) => new Date(a.published_at) - new Date(b.published_at));
            
            releases.forEach(release => {
              const tag = release.tag_name;
              
              // Only process decoupled releases containing a slash "/"
              if (tag.includes("/")) {
                const parts = tag.split("/");
                const component = parts[0]; // "cli", "engine", "ide-vscode"
                const version = parts[1];   // e.g. "v1.0.0-build.1"
                
                if (component === "cli" || component === "engine" || component === "ide-vscode") {
                  const channel = release.prerelease ? "insider" : "stable";
                  
                  if (!manifest.channels[channel]) {
                    manifest.channels[channel] = {};
                  }
                  const channelObj = manifest.channels[channel];
                  
                  // Initialize component structure
                  channelObj[component] = {
                    version: version,
                    published_at: release.published_at || new Date().toISOString(),
                    assets: {}
                  };
                  
                  const escapedVersion = version.replace(/[-\/\\^$*+?.()|[\]{}]/g, "\\$&");
                  
                  // Regex matches component name and version with optional platform
                  const regex = new RegExp("niksphere-([a-zA-Z0-9-]+)-" + escapedVersion + "(?:-((?:win|linux|mac)-(?:x64|arm64)|docker))?\\.(.+)$");
                  
                  if (release.assets) {
                    release.assets.forEach(asset => {
                      const match = asset.name.match(regex);
                      if (match) {
                        const matchedComponent = match[1];
                        const platform = match[2];
                        
                        if (matchedComponent === component) {
                          if (platform) {
                            channelObj[component].assets[platform] = asset.browser_download_url;
                          } else {
                            if (component === "ide-vscode") {
                              channelObj[component].assets["vsix"] = asset.browser_download_url;
                            } else {
                              channelObj[component].assets["default"] = asset.browser_download_url;
                            }
                          }
                        }
                      }
                    });
                  }
                }
              }
            });
            
            // Clean up legacy global properties in channels if they exist
            for (const ch in manifest.channels) {
              const channelObj = manifest.channels[ch];
              delete channelObj.version;
              delete channelObj.published_at;
              delete channelObj.notes;
              delete channelObj.versions;
            }
            
            fs.writeFileSync("releases.json", JSON.stringify(manifest, null, 2));
            console.log("releases.json successfully rebuilt from GitHub Releases.");
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add releases.json
          
          if git diff --cached --quiet; then
            echo "No changes made to releases.json."
          else
            git commit -m "chore: update releases.json for release"
            git push origin main
          fi
